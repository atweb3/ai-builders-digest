name: AI Builders Digest

on:
  schedule:
    # 北京时间 08:30 (UTC 00:30)
    - cron: "30 0 * * *"
    # 北京时间 16:30 (UTC 08:30)
    - cron: "30 8 * * *"
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # 允许推送 state-feed.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run digest script
        run: node index.js
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      - name: Commit state file
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add state-feed.json
          git diff --staged --quiet || git commit -m "Update feed state"
          git push
